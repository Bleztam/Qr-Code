<style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;

<body class="min-h-screen flex flex-col items-center pt-8 px-container-padding pb-24 md:pb-8 max-w-[1200px] mx-auto">
<!-- Top Navigation Omitted for Transactional Screen -->
<main class="w-full max-w-md flex flex-col items-center justify-center flex-grow space-y-stack-lg">
<!-- Success Animation / Illustration -->
<div class="w-48 h-48 rounded-full bg-surface-container-low flex items-center justify-center mb-4 relative overflow-hidden shadow-sm">
<div class="w-full h-full bg-cover bg-center absolute inset-0 opacity-80" data-alt="A minimalist, flat vector illustration of a pristine white ceramic plate viewed from directly above, sitting on a soft, light grey surface. The plate has a stylized, abstract checkmark in deep forest green across the center, symbolizing completion and freshness. The lighting is soft and even, highlighting the clean, modern fast-casual dining aesthetic." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuA_21pKfbG_sfaEJK_ggxGufsHxFsfUD7FTYCVmX6mGmjHQGnK10h4hFq6kLkVdLx-b5GC9z6obJO8RY2qokhHUt7cy-A_HpKJeVYx4gRYqpPnh1w8oWeZq0_9Gnf4OVq9t1oQvYMTYqiW3qy4w32etvC-ZtUtDKtM6FDwU7pQzmmkh-TodPCaf2-LaI7SR7X_DlNFCMxd68tFVLfI6Ox_7C3E6yqWyjSsR8yMsotBE_7YPZ70bpo8awubikwI8azVTxJ4qxrVfXQuV')"></div>
<span class="material-symbols-outlined text-primary text-[64px] z-10" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<!-- Heading Section -->
<div class="text-center space-y-stack-sm w-full">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-surface">Order Placed!</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-[280px] mx-auto">
                Please show this screen to your waiter to confirm payment.
            </p>
</div>
<!-- Payment Details Card -->
<div class="w-full bg-surface border border-outline-variant rounded-xl p-6 shadow-sm flex flex-col space-y-stack-md mt-4 relative overflow-hidden">
<!-- Subtle accent bar on the left -->
<div class="absolute left-0 top-0 bottom-0 w-1 bg-primary"></div>
<h2 class="font-headline-md text-headline-md text-primary mb-2 flex items-center">
<span class="material-symbols-outlined mr-2">payments</span>
                Payment Details
            </h2>
<div class="space-y-stack-sm flex flex-col">
<!-- Telebirr Item -->
<div class="flex items-center justify-between p-4 bg-surface-bright rounded-lg border border-outline-variant/50 hover:bg-surface-container-low transition-colors group">
<div class="flex flex-col">
<span class="font-label-caps text-label-caps text-on-surface-variant mb-1">Telebirr</span>
<span class="font-body-lg text-body-lg text-on-surface font-semibold tracking-wide">0911XXXXXX</span>
</div>
<button aria-label="Copy Telebirr number" class="w-10 h-10 rounded-full flex items-center justify-center text-primary bg-surface-container hover:bg-primary/10 transition-colors focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" onclick="copyToClipboard('0911XXXXXX', this)">
<span class="material-symbols-outlined">content_copy</span>
</button>
</div>
<!-- CBE Bank Account Item -->
<div class="flex items-center justify-between p-4 bg-surface-bright rounded-lg border border-outline-variant/50 hover:bg-surface-container-low transition-colors group">
<div class="flex flex-col">
<span class="font-label-caps text-label-caps text-on-surface-variant mb-1">CBE Bank Account</span>
<span class="font-body-lg text-body-lg text-on-surface font-semibold tracking-wide">1000XXXXXXXXX</span>
</div>
<button aria-label="Copy CBE Bank Account number" class="w-10 h-10 rounded-full flex items-center justify-center text-primary bg-surface-container hover:bg-primary/10 transition-colors focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" onclick="copyToClipboard('1000XXXXXXXXX', this)">
<span class="material-symbols-outlined">content_copy</span>
</button>
</div>
</div>
<!-- Toast notification container (hidden by default) -->
<div class="absolute bottom-4 left-1/2 transform -translate-x-1/2 bg-inverse-surface text-inverse-on-surface font-body-sm text-body-sm px-4 py-2 rounded-full opacity-0 transition-opacity duration-300 pointer-events-none flex items-center whitespace-nowrap" id="toast-container">
<span class="material-symbols-outlined text-[16px] mr-2">check</span>
<span id="toast-message">Copied!</span>
</div>
</div>
<!-- Bottom Action (Optional Return Home) -->
<div class="w-full pt-stack-md">
<button class="w-full py-4 px-6 bg-surface-container text-on-surface font-label-caps text-label-caps rounded-full border border-outline-variant hover:bg-surface-variant transition-colors flex items-center justify-center">
                 Return to Menu
             </button>
</div>
</main>
<script>
        function copyToClipboard(text, buttonElement) {
            // In a real app, you'd use navigator.clipboard.writeText(text)
            console.log('Copied:', text);
            
            // Visual feedback on the button
            const iconSpan = buttonElement.querySelector('.material-symbols-outlined');
            const originalIcon = iconSpan.textContent;
            iconSpan.textContent = 'check';
            buttonElement.classList.add('bg-secondary-fixed', 'text-on-secondary-fixed');
            buttonElement.classList.remove('text-primary', 'bg-surface-container');
            
            // Show toast
            const toast = document.getElementById('toast-container');
            toast.style.opacity = '1';
            
            setTimeout(() => {
                iconSpan.textContent = originalIcon;
                buttonElement.classList.remove('bg-secondary-fixed', 'text-on-secondary-fixed');
                buttonElement.classList.add('text-primary', 'bg-surface-container');
                toast.style.opacity = '0';
            }, 2000);
        }
    </script>
</body></html>
